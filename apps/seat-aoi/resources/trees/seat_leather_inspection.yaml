# Seat Leather Inspection Decision Tree
# Evaluated by DefaultReasoner (TreeWalker + ScoreCalculator) to produce
# final verdict, severity, and recommendation.
#
# Format: type=leaf or type=branch with field + branches map + default child.
# Branch keys support numeric ranges: ">N", ">=N", "<N", "<=N".
# IMPORTANT: std::map sorts keys alphabetically, so ">0.6" < ">0.8".
# To check highest thresholds first, nest branches via default chaining.
# Leaf severity is computed as sigmoid(weighted_sum - threshold).

verdict_mapping:
  ng_threshold: 0.7
  warn_threshold: 0.3

type: branch
field: detection.anomaly_map.max_score
branches:
  ">0.8":
    type: leaf
    label: NG
    recommendation: "Critical anomaly — reject immediately and quarantine part"
    formulas:
      - weights: [0.5, 0.5]
        features: [detection.anomaly_map.max_score, detection.image_level_score]
        threshold: 0.3
default:
  type: branch
  field: detection.anomaly_map.max_score
  branches:
    ">0.6":
      type: branch
      field: detection.region_count
      branches:
        ">3":
          type: leaf
          label: NG
          recommendation: "Multiple anomalous regions (>3) with elevated score — reject"
          formulas:
            - weights: [0.3, 0.3, 0.4]
              features:
                [detection.anomaly_map.max_score, detection.image_level_score,
                 detection.region_count]
              threshold: 0.35
        ">0":
          type: leaf
          label: WARN
          recommendation: "Elevated anomaly score with few regions — flag for manual inspection"
          formulas:
            - weights: [0.5, 0.5]
              features: [detection.anomaly_map.max_score, detection.image_level_score]
              threshold: 0.4
      default:
        type: leaf
        label: UNCERTAIN
        recommendation: "Anomaly score elevated but no regions detected — inspect manually"
        formulas:
          - weights: [1.0]
            features: [detection.image_level_score]
            threshold: 0.5
  default:
    type: branch
    field: detection.anomaly_map.max_score
    branches:
      ">0.4":
        type: leaf
        label: WARN
        recommendation: "Mild anomaly score — continue monitoring and track in history"
        formulas:
          - weights: [0.6, 0.4]
            features: [detection.image_level_score, detection.anomaly_map.max_score]
            threshold: 0.45
    default:
      type: leaf
      label: OK
      recommendation: "No significant anomaly detected — pass"
      formulas:
        - weights: [1.0]
          features: [detection.image_level_score]
          threshold: 0.5
