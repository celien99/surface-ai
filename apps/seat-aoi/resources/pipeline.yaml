pipeline:
  name: "seat_aoi_inspection"
  version: "1.0"
  backpressure:
    default: block
    stage_overrides:
      capture: drop_oldest

  stages:
    - id: capture
      type: Capture
      depends_on: []
      config:
        device: "mock_camera_0"

    - id: preprocess
      type: Preprocess
      depends_on: [capture]
      config:
        steps: [debayer, white_balance, resize]
        resize_width: 1024
        resize_height: 1024

    - id: inference
      type: Inference
      depends_on: [preprocess]
      config:
        engine: MockEngine
        model: dino_v3_vit_base

    - id: detect
      type: Detect
      depends_on: [inference]
      config:
        detector: PatchCore
        k_nearest: 5
        self_evolution:
          enabled: true
          normality:
            k_self_query: 5
            tail_ratio_max: 0.10
          novelty:
            coverage_threshold: 0.60
          buffer:
            max_frames: 50
            max_patches: 50000
            trigger_frames: 20
            trigger_patches: 20000
          update:
            target_size: 10000
            min_interval_sec: 5
            greedy_prefilter: 5000
          persistence:
            save_on_stop: true
            backup_old_bank: true
            max_backups: 3

    - id: rule_eval
      type: RuleEval
      depends_on: [detect]
      config:
        rule_file: "rules/seat_leather_defects.yaml"

    - id: reason
      type: Reason
      depends_on: [rule_eval]
      config:
        tree_file: "trees/seat_leather_inspection.yaml"

    - id: export
      type: Export
      depends_on: [reason]
      config:
        exporter: JsonExporter
        output_dir: "/tmp/surface-ai/results/"
