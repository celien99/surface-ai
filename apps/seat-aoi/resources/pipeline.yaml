pipeline:
  name: "seat_aoi_inspection"
  version: "1.0"
  backpressure:
    default: block
    stage_overrides:
      capture: drop_oldest

  stages:
    - id: capture
      type: Capture
      depends_on: []
      config:
        device: "mock_camera_0"
        trigger_mode: "freerun"  # freerun | hardware | software

    - id: preprocess
      type: Preprocess
      depends_on: [capture]
      config:
        steps: [debayer, white_balance, resize]
        resize_width: 518
        resize_height: 518

    - id: inference
      type: Inference
      depends_on: [preprocess]
      config:
        model: dino_v2_vit_base

    - id: detect
      type: Detect
      depends_on: [inference]
      queue_capacity: 2
      config:
        detector: PatchCore
        k_nearest: 5
        self_evolution:
          enabled: true
          normality:
            k_self_query: 5
            tail_ratio_max: 0.10
          novelty:
            coverage_threshold: 0.60
          buffer:
            max_frames: 50
            max_patches: 50000
            trigger_frames: 20
            trigger_patches: 20000
          update:
            target_size: 10000
            min_interval_sec: 5
            candidate_sample_limit: 5000
          persistence:
            save_on_stop: true
            backup_old_bank: true
            max_backups: 3
          maintenance:
            coverage_saturation_threshold: 0.95
            saturation_window: 10
            max_incremental_updates: 100
            self_validation: true
            validation_degradation_threshold: 0.80
            validation_sample_count: 100

    - id: rule_eval
      type: RuleEval
      depends_on: [detect]
      config:
        rule_file: "rules/seat_leather_defects.yaml"

    - id: reason
      type: Reason
      depends_on: [rule_eval]
      config:
        tree_file: "trees/seat_leather_inspection.yaml"
        sam2:               # SAM2 for region boundary refinement (disabled by default)
          enabled: false    # enable when SAM2 engine is available
          engine: sam2_vit_h

    - id: export
      type: Export
      depends_on: [reason]
      config:
        exporter: JsonExporter
        output_dir: "/tmp/surface-ai/results/"

  # Optional: Bayesian Auto-Tuning (disabled by default; enable via enabled: true)
  tuning:
    enabled: false
    objective:
      fp_cost: 1.0
      fn_cost: 5.0
