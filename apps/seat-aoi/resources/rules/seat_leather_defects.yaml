# Seat Leather Defect Rules
# Each rule defines a defect detection condition evaluated by the RuleEngine.
# Condition expressions use the string DSL parsed by Lexer+Parser.
# FactBase keys are populated by FactBuilder::MapDetection from DetectionResult.
#
# NOTE: Dotted field paths cannot contain numeric segments (e.g. region.0.area).
# The parser only accepts Identifier tokens after '.', not Number tokens.
# Use facts without indexed segments: anomaly_map.max_score, region_count, etc.

rule_sets:
  seat_leather_inspection:
    - name: "crack_detection"
      priority: 120
      condition: 'detection.anomaly_map.max_score > 0.8 AND detection.region_count > 0'
      action:
        label: "NG"
        base_severity: 0.95
        recommendation: "Critical crack or tear detected — isolate and quarantine immediately"
      overrides: ["scratch_major", "scratch_minor", "dent_detection", "stain_detection"]
      overridden_by: []

    - name: "scratch_major"
      priority: 100
      condition: 'detection.anomaly_map.max_score > 0.7 AND detection.region_count > 0'
      action:
        label: "NG"
        base_severity: 0.80
        recommendation: "Major scratch defect — reject for rework"
      overrides: ["scratch_minor", "dent_detection", "stain_detection"]
      overridden_by: ["crack_detection"]

    - name: "dent_detection"
      priority: 80
      condition: 'detection.anomaly_map.max_score > 0.5 AND detection.image_level_score > 0.4'
      action:
        label: "WARN"
        base_severity: 0.35
        recommendation: "Possible surface dent or indentation — flag for manual review"
      overrides: []
      overridden_by: ["crack_detection", "scratch_major"]

    - name: "stain_detection"
      priority: 60
      condition: 'detection.anomaly_map.max_score > 0.6 AND detection.image_level_score > 0.5'
      action:
        label: "WARN"
        base_severity: 0.25
        recommendation: "Possible stain or discoloration — track and continue monitoring"
      overrides: []
      overridden_by: ["scratch_major"]

    - name: "scratch_minor"
      priority: 50
      condition: 'detection.anomaly_map.max_score > 0.45 AND detection.image_level_score > 0.35'
      action:
        label: "WARN"
        base_severity: 0.20
        recommendation: "Minor surface imperfection — continue monitoring"
      overrides: []
      overridden_by: ["crack_detection", "scratch_major"]

  material_rules:
    - name: "batch_reject_check"
      priority: 150
      condition: 'detection.image_level_score > 0.7 AND detection.region_count > 2'
      action:
        label: "NG"
        base_severity: 0.90
        recommendation: "Multiple high-confidence anomalies — production quality alert triggered"
      overrides: []
      overridden_by: []
