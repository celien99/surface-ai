# Seat Leather Defect Rules
# Each rule defines a defect detection condition evaluated by the RuleEngine

rule_sets:
  surface_defects:
    - name: "scratch_detection"
      description: "Detect scratches on leather surface"
      condition:
        type: "AND"
        children:
          - type: "COMPARE"
            field: "detection.anomaly_score"
            op: "GT"
            value: 0.7
          - type: "COMPARE"
            field: "detection.region_area_mm2"
            op: "GT"
            value: 5.0
      action:
        severity: "major"
        label: "scratch"
      priority: 10

    - name: "dent_detection"
      description: "Detect dents/indentations on leather surface"
      condition:
        type: "AND"
        children:
          - type: "COMPARE"
            field: "detection.depth_deviation_mm"
            op: "GT"
            value: 0.3
          - type: "COMPARE"
            field: "detection.anomaly_score"
            op: "GT"
            value: 0.5
      action:
        severity: "minor"
        label: "dent"
      priority: 8

    - name: "stain_detection"
      description: "Detect stains or discoloration"
      condition:
        type: "AND"
        children:
          - type: "COMPARE"
            field: "detection.color_delta_e"
            op: "GT"
            value: 3.0
          - type: "COMPARE"
            field: "detection.anomaly_score"
            op: "GT"
            value: 0.6
      action:
        severity: "minor"
        label: "stain"
      priority: 6

    - name: "crack_detection"
      description: "Detect cracks or tears in leather"
      condition:
        type: "AND"
        children:
          - type: "COMPARE"
            field: "detection.aspect_ratio"
            op: "GT"
            value: 5.0
          - type: "COMPARE"
            field: "detection.anomaly_score"
            op: "GT"
            value: 0.8
      action:
        severity: "critical"
        label: "crack"
      priority: 12
      overrides: ["scratch_detection"]

  material_rules:
    - name: "batch_reject_check"
      description: "Flag if batch historical reject rate exceeds threshold"
      condition:
        type: "COMPARE"
        field: "knowledge.batch_reject_rate_pct"
        op: "GT"
        value: 5.0
      action:
        severity: "major"
        label: "batch_quality_alert"
      priority: 15
