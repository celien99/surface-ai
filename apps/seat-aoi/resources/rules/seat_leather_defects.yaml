# Seat Leather Defect Rules
# Conditions use structured YAML format (Batch T3):
#   Simple:  {field: "detection.score", op: "gt", value: 0.8}
#   AND:     {and: [{field: a, op: gt, value: 0.5}, ...]}
#   OR:      {or: [...]}
#   NOT:     {not: {field: a, op: eq, value: 0}}
# Supported ops: gt, ge, lt, le, eq, neq, and, or, add, sub, mul, div, in

rule_sets:
  seat_leather_inspection:
    - name: "crack_detection"
      priority: 120
      condition:
        and:
          - field: detection.anomaly_map.max_score
            op: gt
            value: 0.8
          - field: detection.region_count
            op: gt
            value: 0
      action:
        label: "NG"
        base_severity: 0.95
        recommendation: "Critical crack or tear detected — isolate and quarantine immediately"
      overrides: ["scratch_major", "scratch_minor", "dent_detection", "stain_detection"]
      overridden_by: []

    - name: "scratch_major"
      priority: 100
      condition:
        and:
          - field: detection.anomaly_map.max_score
            op: gt
            value: 0.7
          - field: detection.region_count
            op: gt
            value: 0
      action:
        label: "NG"
        base_severity: 0.80
        recommendation: "Major scratch defect — reject for rework"
      overrides: ["scratch_minor", "dent_detection", "stain_detection"]
      overridden_by: ["crack_detection"]

    - name: "dent_detection"
      priority: 80
      condition:
        and:
          - field: detection.anomaly_map.max_score
            op: gt
            value: 0.5
          - field: detection.image_level_score
            op: gt
            value: 0.4
      action:
        label: "WARN"
        base_severity: 0.35
        recommendation: "Possible surface dent or indentation — flag for manual review"
      overrides: []
      overridden_by: ["crack_detection", "scratch_major"]

    - name: "stain_detection"
      priority: 60
      condition:
        and:
          - field: detection.anomaly_map.max_score
            op: gt
            value: 0.6
          - field: detection.image_level_score
            op: gt
            value: 0.5
      action:
        label: "WARN"
        base_severity: 0.25
        recommendation: "Possible stain or discoloration — track and continue monitoring"
      overrides: []
      overridden_by: ["scratch_major"]

    - name: "scratch_minor"
      priority: 50
      condition:
        and:
          - field: detection.anomaly_map.max_score
            op: gt
            value: 0.45
          - field: detection.image_level_score
            op: gt
            value: 0.35
      action:
        label: "WARN"
        base_severity: 0.20
        recommendation: "Minor surface imperfection — continue monitoring"
      overrides: []
      overridden_by: ["crack_detection", "scratch_major"]

  material_rules:
    - name: "batch_reject_check"
      priority: 150
      condition:
        and:
          - field: detection.image_level_score
            op: gt
            value: 0.7
          - field: detection.region_count
            op: gt
            value: 2
      action:
        label: "NG"
        base_severity: 0.90
        recommendation: "Multiple high-confidence anomalies — production quality alert triggered"
      overrides: []
      overridden_by: []
