# Surface AI Model Manifest
# Records TensorRT engine files used by the inference pipeline.
# Each engine must match the binding names/shapes expected by the
# corresponding adapter (DinoV3Adapter, ClipAdapter, Sam2Adapter).

models:
  dino_v3_vit_base:
    description: "DINOv3 ViT-B/14 patch feature extractor (default detector backbone)"
    path: dino_v3_vit_base.engine
    source: huggingface:facebook/dinov3-vit-base-patch14-1024
    input_bindings:
      - name: pixel_values
        shape: [1, 3, 1024, 1024]
        dtype: float32  # or float16 if FP16 engine
    output_bindings:
      - name: last_hidden_state
        shape: [1, 5329, 1024]  # grid_h*grid_w = 73*73 = 5329
        dtype: float32
    patch_size: 14
    embed_dim: 1024
    image_size: 1024
    fp16: true
    exported_at: "2026-07-15"
    export_script: tools/export_dino_v3.py

  clip_vit_b32:
    description: "CLIP ViT-B/32 global feature extractor"
    path: clip_vit_b32.engine
    source: huggingface:openai/clip-vit-base-patch32
    input_bindings:
      - name: pixel_values
        shape: [1, 3, 224, 224]
        dtype: float32
    output_bindings:
      - name: features
        shape: [1, 512]
        dtype: float32
    embed_dim: 512
    image_size: 224
    fp16: true
    exported_at: null
    export_script: tools/export_clip.py

  sam2_vit_h:
    description: "SAM2 ViT-H image encoder for segmentation prompts"
    path: sam2_vit_h.engine
    source: facebookresearch:sam2-hiera-large
    input_bindings:
      - name: image
        shape: [1, 3, 1024, 1024]
        dtype: float32
      - name: prompt
        shape: [1, 4, 256, 256]
        dtype: float32
    output_bindings:
      - name: masks
        shape: [1, 1, 256, 256]
        dtype: float32
    image_size: 1024
    fp16: true
    exported_at: null
    export_script: tools/export_sam2.py
